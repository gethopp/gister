name: Release

# Tag-push release: builds signed installers for macOS (Intel + Apple Silicon),
# Windows and Linux, generates release notes with git-cliff, and publishes a
# draft GitHub Release with the updater's latest.json. Publishing the draft is
# what makes the update visible to running apps.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Guard against re-releasing an existing version. Reads the Tauri version from
  # src-tauri/tauri.conf.json and aborts before any build if a GitHub Release
  # (including drafts) already matches that version, saving CI time on mistaken
  # or duplicate tag pushes.
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure tag matches tauri.conf.json version
        run: |
          version=$(jq -r '.version' src-tauri/tauri.conf.json)
          if [ "${GITHUB_REF_NAME}" != "v${version}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match app version v${version}"
            exit 1
          fi
          echo "Tag ${GITHUB_REF_NAME} matches app version v${version}."

      - name: Abort if release version already exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(jq -r '.version' src-tauri/tauri.conf.json)
          target="v${version}"
          echo "Tauri version: ${version} (target tag: ${target})"

          existing=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 200 --json tagName --jq '.[].tagName')
          if printf '%s\n' "$existing" | grep -qxE "${version}|${target}"; then
            echo "::error::A release for ${target} already exists. Skipping to avoid a duplicate/mistaken release."
            exit 1
          fi
          echo "No existing release matches ${target}. Proceeding."

  changelog:
    needs: preflight
    runs-on: ubuntu-latest
    outputs:
      notes: ${{ steps.collect.outputs.notes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Generate changelog
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Expose notes as job output
        id: collect
        run: |
          {
            echo "notes<<GISTER_EOF"
            cat "${{ steps.cliff.outputs.changelog }}"
            echo "GISTER_EOF"
          } >> "$GITHUB_OUTPUT"

  release:
    needs: changelog
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Baked into the frontend bundle so the released app can log in.
          VITE_GITHUB_CLIENT_ID: ${{ secrets.VITE_GITHUB_CLIENT_ID }}
          # Updater artifact signing (minisign).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Gister ${{ github.ref_name }}'
          releaseBody: ${{ needs.changelog.outputs.notes }}
          releaseDraft: true
          args: ${{ matrix.args }}
